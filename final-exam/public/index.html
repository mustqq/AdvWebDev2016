<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customer Registry - Final Exam</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="index.js" defer></script>
</head>
<body>
    <header class="site-header">
        <div class="container header-grid">
            <section>
                <h1 class="site-title">
                    <a href="/" class="site-title-link">ClientCore</a>
                </h1>
                <p class="site-tagline">A minimal customer registry system.</p>
            </section>
            <aside class="author-card">
                <p><strong>Author:</strong> <span id="author-name">Glen-Henrik Mustonen</span></p>
                <p><strong>Group ID:</strong> <span id="group-id">NTIS24K</span></p>
            </aside>
        </div>
    </header>

    <main>
        <div class="container layout">
            <section class="hero-card" aria-labelledby="overview-heading">
                <h2 id="overview-heading">System Overview</h2>
                <p>This customer management interface allows users to add, update, and remove records.</p>
            </section>

            <div class="content-grid">
                <section class="panel" aria-labelledby="customer-management-heading">
                    <h2 id="customer-management-heading">Customer Management</h2>
                    <form id="person-form" class="management-form">
                        <input type="hidden" id="person-id">
                        <div class="form-group">
                            <label for="first_name">First Name *</label>
                            <input type="text" id="first_name" required>
                        </div>
                        <div class="form-group">
                            <label for="last_name">Last Name *</label>
                            <input type="text" id="last_name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email *</label>
                            <input type="email" id="email" required>
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone</label>
                            <input type="text" id="phone">
                        </div>
                        <div class="form-group">
                            <label for="birth_date">Birth Date</label>
                            <input type="date" id="birth_date">
                        </div>
                        <div class="form-actions">
                            <button type="submit" id="submit-btn">Add Customer</button>
                            <button type="button" id="delete-btn" class="btn-danger" style="display: none;">Delete</button>
                            <button type="button" id="clear-btn" class="btn-secondary">Clear</button>
                        </div>
                    </form>
                </section>

                <section class="panel" aria-labelledby="customer-records-heading">
                    <h2 id="customer-records-heading">Customer Records</h2>
                    <div id="customer-list">
                        <p>Loading customers...</p>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>A minimal customer registry system.</p>
        </div>
    </footer>
</body>
</html>
